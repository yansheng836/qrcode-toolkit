<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRCode Toolkit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1 class="header-title">QRCode Toolkit</h1>
    <div class="header-actions">
      <a href="https://github.com/yansheng836/qrcode-toolkit" target="_blank" class="header-link" title="GitHub">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <a href="https://github.com/yansheng836/qrcode-toolkit/issues" target="_blank" class="header-link" title="反馈问题">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9-3a1 1 0 11-2 0 1 1 0 012 0zm-.25 3.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z"/></svg>
      </a>
      <div class="header-divider"></div>
      <button class="theme-btn" data-theme="light" title="极简白">
        <span class="theme-icon">☀</span>
      </button>
      <button class="theme-btn" data-theme="dark" title="暗色主题">
        <span class="theme-icon">🌙</span>
      </button>
      <button class="theme-btn" data-theme="gradient" title="渐变毛玻璃">
        <span class="theme-icon">🎨</span>
      </button>
    </div>
  </header>

  <main class="main">
    <aside class="panel">
      <section class="panel-section">
        <h2 class="section-title">内容</h2>
        <div id="content-area"></div>
      </section>

      <section class="panel-section">
        <h2 class="section-title">样式</h2>
        <div id="style-area"></div>
      </section>

      <section class="panel-section">
        <h2 class="section-title">导出</h2>
        <div id="export-area"></div>
      </section>

      <section class="panel-section tips-section">
        <h2 class="section-title">使用提示</h2>
        <ul class="tips-list">
          <li>保存前建议用手机扫码测试，确认能正确识别内容</li>
          <li>背景图片和 Logo 建议使用 <strong>1:1</strong> 比例，避免被拉伸变形</li>
          <li>背景颜色和 Logo 颜色避免与二维码点位颜色过于接近，否则可能影响扫码识别</li>
        </ul>
      </section>
    </aside>

    <div class="preview">
      <div class="preview-card">
        <div id="qr-preview" class="qr-container">
          <p class="qr-placeholder">输入内容后自动生成二维码</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/qrcode.js"></script>
  <script src="js/app.js"></script>
  <script>initTheme();</script>
</body>
</html>
